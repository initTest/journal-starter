apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1" # This "Sidecar" label is what tells Grafana to load this
spec:
  data:
    fastapi-stats.json: |-
      {
        "annotations": { "list": [] },
        "editable": true,
        "fiscalYearStartMonth": 0,
        "graphTooltip": 0,
        "links": [],
        "liveNow": false,
        "panels": [
          {
            "title": "API Request Rate (RPS)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "targets": [
              {
                "expr": "sum(rate(http_request_duration_seconds_count[1m]))",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
          },
          {
            "title": "Error Rate (5xx)",
            "type": "timeseries",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "targets": [
              {
                "expr": "sum(rate(http_request_duration_seconds_count{status=~\"5..\"}[1m]))",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
          }
        ],
        "schemaVersion": 36,
        "style": "dark",
        "tags": ["fastapi"],
        "templating": { "list": [] },
        "time": { "from": "now-1h", "to": "now" },
        "title": "FastAPI Monitoring (Journal API)",
        "uid": "fastapi-journal-1",
        "version": 1
      }
